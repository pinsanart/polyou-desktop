<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="scripts/flashcard_viewmodel.js"></script>
    <script src="scripts/flashcard.js"></script>
</head>
<body>    
    <script>
        async function main() {
            flashcardViewModel = new FlashcardViewModel()
            await flashcardViewModel.isReady()
            
            flashcard = new Flashcard()

            flashcard.setByJSON(
                {
                    frontHTML: "sucess",
                    backHTML: "sucess",
                    imagesFilenames: ['sucess'],
                    audiosFilenames: ["sucess"]
                }
            )
            
            flashcardViewModel.create_one(flashcard.toJSON())            
        }

        main()
    </script>
</body>
</html>
